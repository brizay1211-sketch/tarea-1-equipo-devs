<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 5 - Mayores de Edad</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
            background: #e3f2fd;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #1565C0;
            border-bottom: 3px solid #1565C0;
            padding-bottom: 10px;
        }
        #output {
            background: #1e1e1e;
            color: #00ff00;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            margin: 20px 0;
            max-height: 400px;
            overflow-y: auto;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            gap: 15px;
        }
        .card {
            background: #1565C0;
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            flex: 1;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .card.orange {
            background: #FF9800;
        }
        .card.green {
            background: #4CAF50;
        }
        .card .numero {
            font-size: 36px;
            font-weight: bold;
            margin: 10px 0;
        }
        .card .etiqueta {
            font-size: 16px;
            opacity: 0.9;
        }
        .porcentaje {
            background: #9C27B0;
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-top: 20px;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧑‍🤝‍🧑 Mayores de Edad - Resultados</h1>
        <div id="output">Cargando...</div>
        
        <div class="stats">
            <div class="card">
                <div class="etiqueta">Total Personas</div>
                <div class="numero" id="totalPersonas">0</div>
            </div>
            <div class="card orange">
                <div class="etiqueta">Mayores de Edad</div>
                <div class="numero" id="totalMayores">0</div>
            </div>
            <div class="card green">
                <div class="etiqueta">Menores de Edad</div>
                <div class="numero" id="totalMenores">0</div>
            </div>
        </div>
        
        <div class="porcentaje" id="porcentajeContainer">
            Porcentaje mayores: <span id="porcentaje">0%</span>
        </div>
    </div>

    <!-- Importamos el JavaScript compilado -->
    <script type="module" src="./js/principal.js"></script>
</body>
</html>
